# Local-only helper for benchmark: vary X-RateLimit-Remaining when X-Forwarded-For matches
# the builtin rate-limit rule's rotated value (127.0.0.2). Default baseline clients see 10.
events {}
http {
  map $http_x_forwarded_for $rate_limit_remaining {
    default     "10";
    "127.0.0.2" "7";
  }
  server {
    listen 80;
    location /rate-probe {
      default_type text/plain;
      add_header X-RateLimit-Remaining $rate_limit_remaining always;
      return 200 'ok\n';
    }
  }
}
