name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axiom_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d axiom_ci"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 12
    env:
      AXIOM_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/axiom_ci?sslmode=disable
      AXIOM_TEST_MIGRATIONS_DIR: ${{ github.workspace }}/migrations

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Migration layout
        run: ./scripts/check_migrations.sh

      - name: Shell syntax (local proof scripts)
        run: bash -n scripts/read_trust_assert.sh && bash -n scripts/e2e_local.sh && bash -n scripts/benchmark_findings_local.sh

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

      - name: go test
        run: go test ./... -count=1
