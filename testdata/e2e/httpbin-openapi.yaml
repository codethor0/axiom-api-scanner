openapi: 3.0.3
info:
  title: axiom-e2e-httpbin
  version: "1.0"
servers:
  - url: http://127.0.0.1:18080
paths:
  /anything/{id}:
    get:
      summary: path param echo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /post:
    post:
      summary: json post echo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
